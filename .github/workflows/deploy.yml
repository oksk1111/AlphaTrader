name: Deploy to Oracle Cloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            echo "🚀 Starting deployment via GitHub Actions..."
            cd ~/US-ETF-Sniper
            
            # 1. Update Code
            echo "📥 (Step 1/3) Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Update Environment Variables (Telegram)
            echo "🔧 (Step 2/3) Updating configuration..."
            if [ -f .env ]; then
              grep -v "TELEGRAM_" .env > .env.tmp || true
              mv .env.tmp .env
            fi
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
            
            # 3. Execute Deployment Script
            echo "🔄 (Step 3/3) Running local deploy script..."
            chmod +x deployment/deploy.sh
            ./deployment/deploy.sh

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram skipped"
            exit 0
          fi
          
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          COMMIT="${{ github.sha }}"
          STATUS="${{ job.status }}"
          ACTOR="${{ github.actor }}"
          
          if [ "$STATUS" == "success" ]; then
            MSG="✅ *US-ETF-Sniper 배포 성공*%0A📅 $TIMESTAMP%0A👤 $ACTOR%0A🔗 Commit: ${COMMIT:0:7}"
          else
            MSG="❌ *US-ETF-Sniper 배포 실패*%0A📅 $TIMESTAMP%0A👤 $ACTOR%0A🔗 Commit: ${COMMIT:0:7}%0A⚠️ 확인 요망"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"             -d chat_id="${TELEGRAM_CHAT_ID}"             -d text="${MSG}"             -d parse_mode="Markdown" || true
